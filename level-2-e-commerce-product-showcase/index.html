<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="product-section">
      <h1 id="title">Handy Eletro Clothes Inc.</h1>
      <p>Where you can get both your clothes and eletronics in one store</p>
      <div>
        <label for="search-field">Search products</label>
        <input
          type="text"
          id="search-field"
          placeholder="Search by product title"
        />
      </div>
      <div>
        <form>
          <fieldset>
            <legend>Pick your category:</legend>
            <label
              ><input
                type="checkbox"
                name="category"
                value="men's clothing"
                id="men-cat"
              />
              men's clothing</label
            >
            <label
              ><input
                type="checkbox"
                name="category"
                value="jewelery"
                id="jewelry-cat"
              />
              jewelery</label
            >
            <label
              ><input
                type="checkbox"
                name="category"
                value="electronics"
                id="electronics-cat"
              />
              electronics</label
            >
            <label
              ><input
                type="checkbox"
                name="category"
                value="women's clothing"
                id="women-cat"
              />
              women's clothing</label
            >
          </fieldset>
        </form>
      </div>
      <div id="product-container"></div>
      <section id="contact-section">
        <h2>Contact Me</h2>
        <p>
          Have a question about an item or want help finding something? Send a
          message and your email app will open a draft.
        </p>
        <form
          id="contact-form"
          action="mailto:your-email@example.com"
          method="post"
          enctype="text/plain"
        >
          <label for="contact-name">Name</label>
          <input
            type="text"
            id="contact-name"
            name="Name"
            placeholder="Your name"
            required
          />

          <label for="contact-email">Email</label>
          <input
            type="email"
            id="contact-email"
            name="Email"
            placeholder="you@example.com"
            required
          />

          <label for="contact-message">Message</label>
          <textarea
            id="contact-message"
            name="Message"
            rows="6"
            placeholder="Tell me what you need help with"
            required
          ></textarea>

          <button type="submit" id="contact-submit">Send Email</button>
        </form>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
