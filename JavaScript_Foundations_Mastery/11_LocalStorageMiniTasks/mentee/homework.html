<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>localStorage Homework – Favorite Quote Saver</title>
    <link rel="stylesheet" href="homework.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Favorite Quote Saver</h1>
        <p class="subtitle">
          Save your favorite quote to localStorage so it survives a page
          refresh.
        </p>

        <div class="field">
          <label for="quoteInput">Enter your favorite quote</label>
          <textarea id="quoteInput" class="textarea" rows="4"></textarea>
        </div>

        <div class="button-row">
          <button id="saveQuoteBtn" class="btn primary">Save Quote</button>
          <button id="clearQuoteBtn" class="btn ghost">Clear Quote</button>
        </div>

        <div class="display-block">
          <h2>Saved Quote</h2>
          <p id="quoteDisplay" class="quote-display">No quote saved yet.</p>
        </div>

        <p class="hint">
          Connect this to <code>homework.js</code> and refresh the page to
          confirm the saved quote persists.
        </p>
      </section>
    </main>
    <script src="homework.js"></script>
  </body>
</html>
