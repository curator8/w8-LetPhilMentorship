<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Axios Homework – Country Info</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="homework.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Country Info Viewer (Axios)</h1>
        <p class="subtitle">
          Search for a country using Axios with async/await to load its data.
        </p>

        <div class="field-row">
          <label for="countryInput">Country name</label>
          <input
            id="countryInput"
            type="text"
            placeholder="Try France, Kenya, or Mexico"
          />
          <button id="searchCountryBtn" class="btn primary">
            Search Country
          </button>
        </div>

        <div class="info-block">
          <h2 id="countryNameDisplay"></h2>
          <p id="countryCapitalDisplay"></p>
          <p id="countryRegionDisplay"></p>
          <p id="countryPopulationDisplay"></p>
        </div>

        <p id="countryStatusMessage" class="status-message"></p>

        <p class="hint">
          Open <code>homework.js</code> and complete each step to wire up the
          Axios request and UI updates.
        </p>
      </section>
    </main>
    <script src="homework.js"></script>
  </body>
</html>
