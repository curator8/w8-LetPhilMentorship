<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>API Homework – Simple Country Info</title>
    <link rel="stylesheet" href="homework.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Simple Country Info Viewer</h1>
        <p class="subtitle">
          Enter a country name to fetch its information from an API.
        </p>

        <div class="field-row">
          <label for="countryInput">Country name</label>
          <input
            id="countryInput"
            type="text"
            placeholder="Try Japan, Brazil, or Canada"
          />
          <button id="searchCountryBtn" class="btn primary">
            Search Country
          </button>
        </div>

        <div class="info-block">
          <h2 id="countryNameDisplay"></h2>
          <p id="countryCapitalDisplay"></p>
          <p id="countryRegionDisplay"></p>
          <p id="countryPopulationDisplay"></p>
        </div>

        <p id="countryStatusMessage" class="status-message"></p>

        <p class="hint">
          Open <code>homework.js</code> and follow each STEP. Use DevTools →
          Network to see the request to restcountries.com.
        </p>
      </section>
    </main>
    <script src="homework.js"></script>
  </body>
</html>
